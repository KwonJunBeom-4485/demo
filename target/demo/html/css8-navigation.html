<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네비게이션 구현</title>
    <style>
        div {
            height: 20%;
        }
        ul {
            list-style-type: none;
        }
        .virtical ul {
            width: 25%;
            background-color: slateblue;
            height: 100%;
            position: relative;
            overflow: auto;
        }
        .virtical li a {
            display: block;
            color: #fff;
            padding: 6px 16px;
            text-decoration: none;
        }
        .virtical li a.active {
            background-color: slateblue;
            color: white;
        }
        .virtical li a:hover:not(.active) {
            background-color: #222;
        }

        .horizontal ul {
            overflow: hidden;
            background-color: darkorange;
        }
        .horizontal li {
            float: left;
            border-right: 1px solid black;
        }
        .horizontal li:last-child {
            border-right: none;
        }
        .horizontal li a {
            display: block;
            color: white;
            text-align: center;
            padding: 10px 16px;
            text-decoration: none;
        }
        .horizontal a:hover:not(.active) {
            background-color: #222;
        }
        .active {
            background-color: burlywood;
        }
    </style>
</head>
<body>
    <h2>네비게이션</h2>
    <div>
        <h3>1. ul을 이용한 네비게이션</h3>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#home">News</a></li>
            <li><a href="#home">Contact</a></li>
            <li><a href="#home">About</a></li>
        </ul>
        <p>네비게이션 테스트</p>
    </div>
    <div class="virtical">
        <h3>2. 수직 네비게이션</h3>
        <ul>
            <li><a class="active" href="#home">Home</a></li>
            <li><a href="#home">News</a></li>
            <li><a href="#home">Contact</a></li>
            <li><a href="#home">About</a></li>
        </ul>
        <p>네비게이션 테스트</p>
    </div>
    <div class="horizontal">
        <h3>3. 수평 네비게이션</h3>
        <ul>
            <li><a class="active" href="#home">Home</a></li>
            <li><a href="#home">News</a></li>
            <li><a href="#home">Contact</a></li>
            <li><a href="#home">About</a></li>
        </ul>
        <p>네비게이션 테스트</p>
    </div>
</body>
</html>
