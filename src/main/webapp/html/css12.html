<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 특성들</title>
    <style>
        h1 { background-color: yellow; }
        h1 { background-color: red; }
        h1 { background-color: greenyellow; }
        /* 우선순위: 101 = id(100) + tag(1) */
        div #a { background-color: purple; color: white; }
        /* 우선순위: 100 = id(100) */
        #a { background-color: yellow; }
        /* div[id=a]를 나중에 선언했는데도 안바뀐다. */
        /* 우선순위: 10 */
        div[id=a] { background-color: blue; }
        /* 우선순위: 11 = 일반 태그(1) + 10 */
        div div[class="intro"] { background-color: aquamarine; }
        /* 우선순위: 10 = 클래스(10)  */
        .intro { background-color: brown; }
    </style>
</head>
<body>
    <h1>heading 1</h1>
    <p>동일한 경우 순서대로 나중에 사용된 CSS가 최종 적용됨.</p>
    <hr>
    <div>
        <h2>CSS 특성 계산2</h2>
        <div id="a">div 태그입니다.</div>
        <p>div #a는 css 우선 순위 값이 101, div[id=a]는 10을 가짐</p>
    </div>
    <hr>
    <div>
        <h2>CSS 특성 계산3</h2>
        <div class="intro">div 태그입니다.</div>
        <p>클래스는 10을 가지고 있고, 일반 태그는 1을 가집니다.</p>
    </div>
</body>
</html>
