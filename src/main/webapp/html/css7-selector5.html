<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>속성 선택자 예제1</title>
    <style>
        section {
            margin: 20px 0;
        }
        /* $는 제일 뒤에 뭐가 붙냐(이 경우는 part2) */
        section[id$='2'] {
            background-color: yellow;
            padding: 10px;
        }
        /* div 태그 중 class 라는 속성을 지니고 있다면 */
        div[class] {
            padding: 5px;
            margin: 5px;
            border: 1px solid black;
        }
        /* class 속성 값이 'l' (소문자 L)로 시작하는 경우 */
        div[class^='l'] {
            background-color: skyblue;
        }
        /* class 속성 값에 'i'를 가지고 있는 경우 */
        div[class*='i'] {
            background-color: hotpink;
        }
        /* class 속성 값이 4로 끝나는 경우 */
        div[class$='4'] {
            background-color: black;
            color: white;
        }
        /* 속성을 이용한 다중 조건(AND) */
        div[class*='e'][class$='2'] {
            background-color: blue;
            color: white;
        }
        #part1 div[class='lest1'] {
            background-color: blanchedalmond;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <section id="part1">
        <div class="lest1">속성 선택자1</div>
        <div class="lis2">속성 선택자2</div>
        <div class="le2">속성 선택자3</div>
        <div class="l4">속성 선택자4</div>
    </section>
    <section id="part2">
        <div class="lest1">속성 선택자1</div>
        <div class="lis2">속성 선택자2</div>
        <div class="le2">속성 선택자3</div>
        <div class="l4">속성 선택자4</div>
    </section>
</body>

</html>
